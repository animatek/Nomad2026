name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
            artifact: Nomad2026-linux-x86_64
          - os: macos-latest
            name: macOS
            artifact: Nomad2026-macos-universal
          - os: windows-latest
            name: Windows
            artifact: Nomad2026-windows-x64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libglu1-mesa-dev \
            libjack-jackd2-dev \
            libwebkit2gtk-4.1-dev \
            libcurl4-openssl-dev

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure (macOS Universal)
        if: runner.os == 'macOS'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake --build build --config Release --target Nomad2026 -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release --target Nomad2026

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          cd build/Nomad2026_artefacts/Release
          tar czf ${{ github.workspace }}/${{ matrix.artifact }}.tar.gz Nomad2026

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd build/Nomad2026_artefacts/Release
          zip -r ${{ github.workspace }}/${{ matrix.artifact }}.zip Nomad2026.app

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd build/Nomad2026_artefacts/Release
          7z a ${{ github.workspace }}/${{ matrix.artifact }}.zip Nomad2026.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Attach binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*
